openapi: "3.0.3"
info:
  title: Nexus Auth API
  version: "1.0.0"
  description: |
    Authentication domain: registration, login, token refresh, logout, MFA setup/verify.

    **Multi-tenant**: Registration creates a tenant + admin user atomically.
    **MFA**: TOTP-based (RFC 6238). Setup → Verify flow.

servers:
  - url: http://localhost:8000/api/v1/auth
    description: Local development

paths:

  /register:
    post:
      summary: Register a new user and tenant
      operationId: register
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User and tenant created. JWT tokens returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /login:
    post:
      summary: Authenticate with email and password
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful. If MFA is enabled, returns 200 with mfa_required=true.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /refresh:
    post:
      summary: Refresh access token
      operationId: refresh
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair. Old refresh token is revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /logout:
    post:
      summary: Logout (revoke refresh token)
      operationId: logout
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refresh token revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /mfa/setup:
    post:
      summary: Initiate MFA setup
      operationId: mfaSetup
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: TOTP secret and QR code URI returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFASetupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /mfa/verify:
    post:
      summary: Verify TOTP code and enable MFA
      operationId: mfaVerify
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFAVerifyRequest"
      responses:
        "200":
          description: MFA enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFAVerifyResponse"
        "400":
          description: Invalid TOTP code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  schemas:

    # ── Requests ─────────────────────────────────

    RegisterRequest:
      type: object
      required: [email, password, tenant_name]
      properties:
        email:
          type: string
          format: email
          example: "admin@example.ro"
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: "Must contain uppercase, lowercase, and digit"
        first_name:
          type: string
          maxLength: 100
          nullable: true
        last_name:
          type: string
          maxLength: 100
          nullable: true
        tenant_name:
          type: string
          minLength: 1
          maxLength: 200
          description: "Company name for the new tenant"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        totp_code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          nullable: true
          description: "Required if MFA is enabled"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    MFAVerifyRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"

    # ── Responses ────────────────────────────────

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: "bearer"
        expires_in:
          type: integer
          example: 900

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    MFASetupResponse:
      type: object
      properties:
        secret:
          type: string
        qr_code_uri:
          type: string
          format: uri

    MFAVerifyResponse:
      type: object
      properties:
        message:
          type: string
        recovery_codes:
          type: array
          items:
            type: string

    # ── Errors ───────────────────────────────────

    APIError:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        detail:
          type: string
        status:
          type: integer

  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
