openapi: "3.0.3"
info:
  title: Nexus Customers API
  version: "1.0.0"
  description: |
    Customer management domain. CRUD, notes, CSV import, history.

    **Multi-tenant**: All queries scoped to tenant. Institution users see branches.
    **Pagination**: Cursor-based (opaque cursor string).

servers:
  - url: http://localhost:8000/api/v1/customers
    description: Local development

paths:

  /:
    post:
      summary: Create a customer
      operationId: createCustomer
      tags: [Customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreate"
      responses:
        "201":
          description: Customer created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

    get:
      summary: List customers (cursor-based)
      operationId: listCustomers
      tags: [Customers]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor for next page
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          schema:
            type: string
          description: Full-text search (name, email, phone)
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [first_name, last_name, email, created_at]
            default: created_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated list of customers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListResponse"

  /{customer_id}:
    get:
      summary: Get a customer by ID
      operationId: getCustomer
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Customer details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update a customer (partial)
      operationId: updateCustomer
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Customer updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      summary: Soft-delete a customer
      operationId: deleteCustomer
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Customer deactivated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /{customer_id}/notes:
    get:
      summary: List notes for a customer
      operationId: listCustomerNotes
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated notes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerNoteListResponse"

    post:
      summary: Add a note to a customer
      operationId: createCustomerNote
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerNoteCreate"
      responses:
        "201":
          description: Note created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerNoteResponse"

  /{customer_id}/history:
    get:
      summary: Get customer activity summary
      operationId: getCustomerHistory
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Counts of appointments, jobs, invoices, notes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerHistorySummary"

  /import:
    post:
      summary: Bulk import customers from CSV
      operationId: importCustomers
      tags: [Customers]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Import completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvImportResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  parameters:
    CustomerId:
      name: customer_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:

    # ── Requests ─────────────────────────────────

    CustomerCreate:
      type: object
      required: [first_name, last_name]
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
          nullable: true
        phone:
          type: string
          maxLength: 30
          nullable: true
        address_line1:
          type: string
          maxLength: 255
          nullable: true
        address_line2:
          type: string
          maxLength: 255
          nullable: true
        city:
          type: string
          maxLength: 100
          nullable: true
        county:
          type: string
          maxLength: 100
          nullable: true
        postal_code:
          type: string
          maxLength: 20
          nullable: true
        country:
          type: string
          minLength: 2
          maxLength: 2
          nullable: true
          description: "ISO 3166-1 alpha-2"

    CustomerUpdate:
      type: object
      properties:
        first_name:  { type: string, minLength: 1, maxLength: 100, nullable: true }
        last_name:   { type: string, minLength: 1, maxLength: 100, nullable: true }
        email:       { type: string, format: email, maxLength: 255, nullable: true }
        phone:       { type: string, maxLength: 30, nullable: true }
        address_line1: { type: string, maxLength: 255, nullable: true }
        address_line2: { type: string, maxLength: 255, nullable: true }
        city:        { type: string, maxLength: 100, nullable: true }
        county:      { type: string, maxLength: 100, nullable: true }
        postal_code: { type: string, maxLength: 20, nullable: true }
        country:     { type: string, minLength: 2, maxLength: 2, nullable: true }

    CustomerNoteCreate:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    # ── Responses ────────────────────────────────

    CustomerResponse:
      type: object
      properties:
        id:            { type: string, format: uuid }
        tenant_id:     { type: string, format: uuid }
        first_name:    { type: string }
        last_name:     { type: string }
        email:         { type: string, nullable: true }
        phone:         { type: string, nullable: true }
        address_line1: { type: string, nullable: true }
        address_line2: { type: string, nullable: true }
        city:          { type: string, nullable: true }
        county:        { type: string, nullable: true }
        postal_code:   { type: string, nullable: true }
        country:       { type: string, nullable: true }
        is_active:     { type: boolean }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    CustomerListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CustomerResponse"
        cursor:
          $ref: "#/components/schemas/CursorMeta"

    CustomerNoteResponse:
      type: object
      properties:
        id:          { type: string, format: uuid }
        customer_id: { type: string, format: uuid }
        content:     { type: string }
        created_by:  { type: string, format: uuid, nullable: true }
        created_at:  { type: string, format: date-time }

    CustomerNoteListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CustomerNoteResponse"
        cursor:
          $ref: "#/components/schemas/CursorMeta"

    CustomerHistorySummary:
      type: object
      properties:
        appointments: { type: integer }
        jobs:         { type: integer }
        invoices:     { type: integer }
        notes:        { type: integer }

    CsvImportResponse:
      type: object
      properties:
        imported: { type: integer }
        skipped:  { type: integer }
        errors:   { type: array, items: { type: string } }

    CursorMeta:
      type: object
      properties:
        next:
          type: string
          nullable: true
        has_more:
          type: boolean

    # ── Shared ───────────────────────────────────

    MessageResponse:
      type: object
      properties:
        message: { type: string }

    APIError:
      type: object
      properties:
        type:   { type: string }
        title:  { type: string }
        detail: { type: string }
        status: { type: integer }

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
