openapi: "3.0.3"
info:
  title: Nexus Appointments API
  version: "1.0.0"
  description: |
    Appointment scheduling domain. CRUD + cancel endpoint.

    **Statuses**: confirmed, in_progress, completed, cancelled.
    **Multi-tenant**: All queries scoped to tenant. Institution users see branches.
    **Pagination**: Cursor-based.

servers:
  - url: http://localhost:8000/api/v1/appointments
    description: Local development

paths:

  /:
    post:
      summary: Create an appointment
      operationId: createAppointment
      tags: [Appointments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentCreate"
      responses:
        "201":
          description: Appointment created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"

    get:
      summary: List appointments (cursor-based)
      operationId: listAppointments
      tags: [Appointments]
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: status
          in: query
          schema:
            type: string
            enum: [confirmed, in_progress, completed, cancelled]
        - name: customer_id
          in: query
          schema: { type: string, format: uuid }
        - name: assigned_to
          in: query
          schema: { type: string, format: uuid }
        - name: from_date
          in: query
          schema: { type: string, description: "ISO 8601 start" }
        - name: to_date
          in: query
          schema: { type: string, description: "ISO 8601 end" }
      responses:
        "200":
          description: Paginated list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentListResponse"

  /{appointment_id}:
    get:
      summary: Get an appointment by ID
      operationId: getAppointment
      tags: [Appointments]
      parameters:
        - $ref: "#/components/parameters/AppointmentId"
      responses:
        "200":
          description: Appointment details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update an appointment (partial)
      operationId: updateAppointment
      tags: [Appointments]
      parameters:
        - $ref: "#/components/parameters/AppointmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Cancel an appointment
      operationId: cancelAppointment
      tags: [Appointments]
      parameters:
        - $ref: "#/components/parameters/AppointmentId"
      responses:
        "200":
          description: Appointment cancelled (status set to cancelled).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    AppointmentId:
      name: appointment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:

    AppointmentCreate:
      type: object
      required: [customer_id, title, scheduled_at]
      properties:
        customer_id:
          type: string
          format: uuid
        assigned_to:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        scheduled_at:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          minimum: 5
          maximum: 480
          default: 60
        notes:
          type: string
          nullable: true

    AppointmentUpdate:
      type: object
      properties:
        title:            { type: string, minLength: 1, maxLength: 255, nullable: true }
        description:      { type: string, nullable: true }
        scheduled_at:     { type: string, format: date-time, nullable: true }
        duration_minutes: { type: integer, minimum: 5, maximum: 480, nullable: true }
        assigned_to:      { type: string, format: uuid, nullable: true }
        status:
          type: string
          enum: [confirmed, in_progress, completed, cancelled]
          nullable: true
        notes: { type: string, nullable: true }

    AppointmentResponse:
      type: object
      properties:
        id:               { type: string, format: uuid }
        tenant_id:        { type: string, format: uuid }
        customer_id:      { type: string, format: uuid }
        assigned_to:      { type: string, format: uuid, nullable: true }
        title:            { type: string }
        description:      { type: string, nullable: true }
        scheduled_at:     { type: string, format: date-time }
        duration_minutes: { type: integer }
        status:           { type: string }
        notes:            { type: string, nullable: true }
        is_active:        { type: boolean }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }

    AppointmentSummary:
      type: object
      properties:
        id:               { type: string, format: uuid }
        customer_id:      { type: string, format: uuid }
        assigned_to:      { type: string, format: uuid, nullable: true }
        title:            { type: string }
        scheduled_at:     { type: string, format: date-time }
        duration_minutes: { type: integer }
        status:           { type: string }
        created_at:       { type: string, format: date-time }

    AppointmentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentSummary"
        cursor:
          $ref: "#/components/schemas/CursorMeta"

    CursorMeta:
      type: object
      properties:
        next:     { type: string, nullable: true }
        has_more: { type: boolean }

    MessageResponse:
      type: object
      properties:
        message: { type: string }

    APIError:
      type: object
      properties:
        type:   { type: string }
        title:  { type: string }
        detail: { type: string }
        status: { type: integer }

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
