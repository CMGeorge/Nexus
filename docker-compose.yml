# Nexus SaaS — Base Services (deployable to all environments)
# No exposed ports — all communication via internal Docker network
# Dev ports (367x) are in docker-compose.dev.yml
# All config from .env

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nexus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nexus_dev}
      - POSTGRES_DB=${POSTGRES_DB:-nexus}
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus-net

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    volumes:
      - nexus_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-api
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_dev}@postgres:5432/${POSTGRES_DB:-nexus}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - nexus_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - nexus-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexus-pgadmin
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@nexus.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_CONFIG_SERVER_MODE=False
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - nexus-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: nexus-mailpit
    restart: unless-stopped
    networks:
      - nexus-net

volumes:
  nexus_pgdata:
    driver: local
  nexus_redisdata:
    driver: local
  nexus_uploads:
    driver: local

networks:
  nexus-net:
    driver: bridge
    name: nexus-net
