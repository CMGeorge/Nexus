# Nexus SaaS — Local Development Environment
# All ports in 367x range to avoid conflicts
# Internal services communicate via Docker network, not exposed ports

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-api
    ports:
      - "3670:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_dev@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3676,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:delegated
      - nexus_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - nexus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    ports:
      - "3676:3000"
    environment:
      - VITE_API_URL=http://localhost:3670
    depends_on:
      - api
    volumes:
      - ./frontend:/app:delegated
    restart: unless-stopped
    networks:
      - nexus-net

  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    ports:
      - "3671:5432"
    environment:
      - POSTGRES_USER=nexus
      - POSTGRES_PASSWORD=nexus_dev
      - POSTGRES_DB=nexus
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus-net

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "3672:6379"
    volumes:
      - nexus_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexus-pgadmin
    ports:
      - "3673:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@nexus.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - nexus-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: nexus-mailpit
    ports:
      - "3674:8025"  # Web UI
      - "3675:1025"  # SMTP
    restart: unless-stopped
    networks:
      - nexus-net

volumes:
  nexus_pgdata:
    driver: local
  nexus_redisdata:
    driver: local
  nexus_uploads:
    driver: local

networks:
  nexus-net:
    driver: bridge
    name: nexus-net
