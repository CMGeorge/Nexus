# Nexus SaaS — Local Development Environment
# All config from .env (copy .env.example → .env)
# Internal services communicate via Docker network

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nexus-api:latest
    container_name: nexus-api
    ports:
      - "${PORT_API:-3670}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_dev}@postgres:5432/${POSTGRES_DB:-nexus}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:delegated
      - nexus_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - nexus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: nexus-frontend:latest
    container_name: nexus-frontend
    ports:
      - "${PORT_FRONTEND:-3676}:3000"
    environment:
      - VITE_API_URL=http://localhost:${PORT_API:-3670}
    depends_on:
      - api
    volumes:
      - ./frontend:/app:delegated
    restart: unless-stopped
    networks:
      - nexus-net

  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    ports:
      - "${PORT_POSTGRES:-3671}:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nexus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nexus_dev}
      - POSTGRES_DB=${POSTGRES_DB:-nexus}
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus-net

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "${PORT_REDIS:-3672}:6379"
    volumes:
      - nexus_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexus-pgadmin
    ports:
      - "${PORT_PGADMIN:-3673}:80"
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@nexus.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_CONFIG_SERVER_MODE=False
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - nexus-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: nexus-mailpit
    ports:
      - "${PORT_MAILPIT_UI:-3674}:8025"
      - "${PORT_MAILPIT_SMTP:-3675}:1025"
    restart: unless-stopped
    networks:
      - nexus-net

volumes:
  nexus_pgdata:
    driver: local
  nexus_redisdata:
    driver: local
  nexus_uploads:
    driver: local

networks:
  nexus-net:
    driver: bridge
    name: nexus-net
