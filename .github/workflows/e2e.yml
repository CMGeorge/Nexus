name: End-to-End Tests

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'mock/**'
      - 'tests/e2e/**'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - '.github/workflows/e2e.yml'
  push:
    branches: [develop, main]
    paths:
      - 'mock/**'
      - 'tests/e2e/**'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start mock services
        run: |
          docker compose -f docker-compose.yml up -d --build mock client-portal admin-panel
          # Wait for all 3 services to be healthy
          for port in 3701 3702 3703; do
            echo "Waiting for port $port..."
            for i in $(seq 1 30); do
              if curl -s -o /dev/null -w "%{http_code}" http://localhost:$port | grep -q 200; then
                echo "Port $port is ready"
                break
              fi
              sleep 1
            done
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package.json

      - name: Install dependencies
        run: cd tests/e2e && npm ci

      - name: Install Playwright browsers
        run: cd tests/e2e && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd tests/e2e && npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/e2e/test-results.json
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down