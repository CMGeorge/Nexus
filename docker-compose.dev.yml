# Nexus SaaS — Development Overlay (local only, NEVER deploy to remote)
# Overrides: exposed dev ports (367x), source mounts for hot-reload, adds frontend
# Merge: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # Override api — add dev port + hot-reload volume mount
  api:
    ports:
      - "${PORT_API:-3670}:8000"
    volumes:
      - ./backend/app:/app/app:delegated

  # Override infra services — expose ports for local tooling
  postgres:
    ports:
      - "${PORT_POSTGRES:-3671}:5432"

  redis:
    ports:
      - "${PORT_REDIS:-3672}:6379"

  pgadmin:
    ports:
      - "${PORT_PGADMIN:-3673}:80"

  mailpit:
    ports:
      - "${PORT_MAILPIT_UI:-3674}:8025"
      - "${PORT_MAILPIT_SMTP:-3675}:1025"

  # Frontend (requires frontend/ submodule — not yet available)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    ports:
      - "${PORT_FRONTEND:-3676}:3000"
    environment:
      - VITE_API_URL=http://localhost:${PORT_API:-3670}
    depends_on:
      - api
    volumes:
      - ./frontend:/app:delegated
    restart: unless-stopped
    networks:
      - nexus-net

  # Mock Admin Portal (static HTML preview for beta validation — ADR-0012)
  mock:
    build:
      context: ./mock
      dockerfile: Dockerfile
    container_name: nexus-mock
    ports:
      - "${PORT_MOCK:-3678}:80"
    volumes:
      - ./mock/public:/usr/share/nginx/html:delegated
    restart: unless-stopped
    networks:
      - nexus-net
    profiles:
      - full
