# Nexus SaaS — Development Overlay (local only, NEVER deploy to remote)
# Exposes dev ports (367x), mounts source volumes for hot-reload, adds api + frontend
# Merge: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-api
    ports:
      - "${PORT_API:-3670}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_dev}@postgres:5432/${POSTGRES_DB:-nexus}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:delegated
      - nexus_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - nexus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    ports:
      - "${PORT_FRONTEND:-3676}:3000"
    environment:
      - VITE_API_URL=http://localhost:${PORT_API:-3670}
    depends_on:
      - api
    volumes:
      - ./frontend:/app:delegated
    restart: unless-stopped
    networks:
      - nexus-net

  # Override base services — expose dev ports for local tooling
  postgres:
    ports:
      - "${PORT_POSTGRES:-3671}:5432"

  redis:
    ports:
      - "${PORT_REDIS:-3672}:6379"

  pgadmin:
    ports:
      - "${PORT_PGADMIN:-3673}:80"

  mailpit:
    ports:
      - "${PORT_MAILPIT_UI:-3674}:8025"
      - "${PORT_MAILPIT_SMTP:-3675}:1025"

volumes:
  nexus_uploads:
    driver: local
