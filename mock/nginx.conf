server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # All routes serve index.html (SPA with hash routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for easy dev iteration
    location ~* \.(css|js|html)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}