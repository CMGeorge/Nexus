server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # All routes serve index.html (SPA with hash routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|svg|woff2)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}